<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eco Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    /* Custom styling */
    #cartSidebar {
      max-width: 400px;
    }

    .btn-cart {
      white-space: nowrap;
    }

    .product-item {
      border: 1px solid #e0e0e0;
      padding: 1rem;
      border-radius: 0.5rem;
      margin-bottom: 1rem;
    }

    .cart-toggle-btn {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1050;
    }
  </style>
</head>
<body>

<!-- Cart Button -->
<button class="btn btn-dark cart-toggle-btn" data-bs-toggle="offcanvas" data-bs-target="#cartSidebar">
  🛒 Cart <span class="badge bg-light text-dark" id="cartCount">0</span>
</button>

<!-- Example Product -->
<div class="container mt-5">
  <div class="row">
    <div class="col-md-4">
      <div class="product-item">
        <h3 class="fs-6 fw-normal">Honey</h3>
        <div class="mb-2">Price: <span class="text-dark fw-semibold">Ksh 1200.00</span></div>
        <input type="number" class="form-control quantity mb-2" value="1" min="1">
        <button class="btn btn-primary btn-cart">Add to Cart</button>
      </div>
    </div>
  </div>
</div>

<!-- Cart Sidebar -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="cartSidebar">
  <div class="offcanvas-header">
    <h5 class="offcanvas-title">Shopping Cart</h5>
    <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
  </div>
  <div class="offcanvas-body d-flex flex-column">
    <ul class="list-group mb-3" id="cartItems"></ul>
    <div class="d-flex justify-content-between mb-3">
      <strong>Total:</strong>
      <strong id="cartTotal">Ksh 0.00</strong>
    </div>
    <button class="btn btn-success w-100">Checkout</button>
  </div>
</div>

<!-- Bootstrap Bundle with Popper -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Your Cart JavaScript -->
<script>
  const cart = [];
  const cartItemsEl = document.getElementById("cartItems");
  const cartTotalEl = document.getElementById("cartTotal");
  const cartCountEl = document.getElementById("cartCount");

  function updateCart() {
    cartItemsEl.innerHTML = "";
    let total = 0;
    cart.forEach((item, index) => {
      const li = document.createElement("li");
      li.className = "list-group-item d-flex justify-content-between align-items-center";
      li.innerHTML = `
        <div>
          <h6 class="mb-1">${item.name}</h6>
          <small>${item.quantity} x Ksh ${item.price.toFixed(2)}</small>
        </div>
        <div>
          <strong>Ksh ${(item.price * item.quantity).toFixed(2)}</strong>
          <button class="btn btn-sm btn-danger ms-2" onclick="removeItem(${index})">×</button>
        </div>`;
      cartItemsEl.appendChild(li);
      total += item.price * item.quantity;
    });
    cartTotalEl.textContent = `Ksh ${total.toFixed(2)}`;
    cartCountEl.textContent = cart.length;
  }

  function removeItem(index) {
    cart.splice(index, 1);
    updateCart();
  }

  document.querySelectorAll(".btn-cart").forEach((btn) => {
    btn.addEventListener("click", (e) => {
      e.preventDefault();
      const parent = btn.closest(".product-item");
      const name = parent.querySelector("h3").textContent.trim();
      const priceText = parent.querySelector(".text-dark.fw-semibold").textContent.trim();
      const price = parseFloat(priceText.replace(/[^\d.]/g, ""));
      const quantity = parseInt(parent.querySelector(".quantity").value);

      const existing = cart.find(p => p.name === name);
      if (existing) {
        existing.quantity += quantity;
      } else {
        cart.push({ name, price, quantity });
      }

      updateCart();
    });
  });
</script>
</body>
</html>
